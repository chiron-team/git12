<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Checkout - Git12 Store</title>
    <meta name="description" content="Complete your purchase at Git12 Store. Enter your shipping and payment information to place your order.">
    <meta name="author" content="">
    <meta name="keywords" content="checkout, payment, order, shipping, purchase">

    <!-- Open Graph -->
    <meta property="og:title" content="Checkout - Git12 Store">
    <meta property="og:description" content="Complete your purchase and place your order at Git12 Store.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/main.css">

    <!-- Preload critical resources -->
    <link rel="preload" href="js/main.js" as="script">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <div class="nav__brand">
                <a href="index.html">
                    <h1>Git12</h1>
                </a>
            </div>
            <ul class="nav__menu">
                <li class="nav__item">
                    <a href="index.html" class="nav__link">Home</a>
                </li>
                <li class="nav__item">
                    <a href="catalog.html" class="nav__link">Catalog</a>
                </li>
                <li class="nav__item">
                    <a href="about.html" class="nav__link">About</a>
                </li>
                <li class="nav__item">
                    <a href="contact.html" class="nav__link">Contact</a>
                </li>
                <li class="nav__item">
                    <a href="cart.html" class="nav__link">Cart</a>
                </li>
            </ul>
            <button class="nav__toggle" aria-label="Toggle navigation">
                <span class="nav__toggle-line"></span>
                <span class="nav__toggle-line"></span>
                <span class="nav__toggle-line"></span>
            </button>
        </nav>
    </header>

    <main class="main">
        <section class="section" style="margin-top: 70px;">
            <div class="container">
                <h2 class="section__title">Checkout</h2>
                <form class="form" id="checkout-form">
                    <h3>Shipping Information</h3>
                    <div class="form__group">
                        <label for="full-name" class="form__label">Full Name</label>
                        <input type="text" id="full-name" name="full-name" class="form__input" required>
                    </div>
                    <div class="form__group">
                        <label for="email" class="form__label">Email</label>
                        <input type="email" id="email" name="email" class="form__input" required>
                    </div>
                    <div class="form__group">
                        <label for="address" class="form__label">Address</label>
                        <input type="text" id="address" name="address" class="form__input" required>
                    </div>
                    <div class="form__group">
                        <label for="city" class="form__label">City</label>
                        <input type="text" id="city" name="city" class="form__input" required>
                    </div>
                    <div class="form__group">
                        <label for="zip" class="form__label">ZIP Code</label>
                        <input type="text" id="zip" name="zip" class="form__input" required>
                    </div>
                    <div class="form__group">
                        <label for="country" class="form__label">Country</label>
                        <input type="text" id="country" name="country" class="form__input" required>
                    </div>

                    <h3>Payment Information</h3>
                    <div class="form__group">
                        <label for="card-name" class="form__label">Name on Card</label>
                        <input type="text" id="card-name" name="card-name" class="form__input" required>
                    </div>
                    <div class="form__group">
                        <label for="card-number" class="form__label">Card Number</label>
                        <input type="text" id="card-number" name="card-number" class="form__input" placeholder="XXXX XXXX XXXX XXXX" required>
                    </div>
                    <div class="form__group">
                        <label for="expiry" class="form__label">Expiry Date</label>
                        <input type="text" id="expiry" name="expiry" class="form__input" placeholder="MM/YY" required>
                    </div>
                    <div class="form__group">
                        <label for="cvv" class="form__label">CVV</label>
                        <input type="text" id="cvv" name="cvv" class="form__input" placeholder="XXX" required>
                    </div>

                    <div class="cart__summary card">
                        <h3 class="card__title">Order Summary</h3>
                        <p>Subtotal: <strong>$69.97</strong></p>
                        <p>Shipping: <strong>$5.00</strong></p>
                        <p>Total: <strong>$74.97</strong></p>
                    </div>

                    <button type="submit" class="btn btn--primary">Place Order</button>
                </form>
                <a href="cart.html" class="btn">&larr; Back to Cart</a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Git12. All rights reserved.</p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="js/main.js"></script>
</body>
</html>
