<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Git12 - Contacto</title>
    <meta name="description" content="Ponte en contacto con nosotros">
    <meta name="author" content="">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    
    <!-- CSS -->
    <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
    <header class="header"></header>

    <main class="main">
        <section class="hero">
            <div class="container">
                <h2 class="hero__title">Contacto</h2>
                <p class="hero__subtitle">¿Tienes alguna pregunta? Escríbenos</p>
            </div>
        </section>

        <section class="section section--alt">
            <div class="container">
                <h2 class="section__title">Envíanos un mensaje</h2>
                <form class="form" id="contact-form">
                    <div class="form__group">
                        <label for="name" class="form__label">Nombre</label>
                        <input type="text" id="name" name="name" class="form__input" required>
                    </div>
                    <div class="form__group">
                        <label for="email" class="form__label">Email</label>
                        <input type="email" id="email" name="email" class="form__input" required>
                    </div>
                    <div class="form__group">
                        <label for="message" class="form__label">Mensaje</label>
                        <textarea id="message" name="message" class="form__textarea" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn--primary">Enviar Mensaje</button>
                </form>
            </div>
        </section>

        <section id="ubicacion" class="section map-section">
            <div class="container">
                <h2 class="section__title">Ubicación</h2>
                <p class="section__description">Encontranos en nuestra sede. ¡Te esperamos!</p>
                <div class="map__wrapper">
                    <iframe
                        class="map__iframe"
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6813.496722535121!2d-64.24512567418559!3d-31.36592255082901!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94329940fa0f3f79%3A0x70e5c92d3c659876!2sVida%20Cowork%20%5BSede%20Wast%5D!5e0!3m2!1sen!2sar!4v1776343038998!5m2!1sen!2sar"
                        width="600"
                        height="450"
                        style="border:0;"
                        allowfullscreen=""
                        loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade"
                        title="Ubicación de Vida Cowork — Sede Wast"
                    ></iframe>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer"></footer>

    <!-- JavaScript -->
    <script src="src/js/components.js"></script>
    <script src="src/js/main.js"></script>
</body>
</html>
