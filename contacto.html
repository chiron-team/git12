<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Git12 - Contacto</title>
    <meta name="description" content="Ponte en contacto con nosotros">
    <meta name="author" content="">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    
    <!-- CSS -->
    <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
    <header class="header"></header>

    <main class="main">
        <section class="hero">
            <div class="container">
                <h2 class="hero__title">Contacto</h2>
                <p class="hero__subtitle">¿Tienes alguna pregunta? Escríbenos</p>
            </div>
        </section>

        <section class="section section--alt">
            <div class="container">
                <h2 class="section__title">Envíanos un mensaje</h2>
                <form class="form" id="contact-form">
                    <div class="form__group">
                        <label for="name" class="form__label">Nombre</label>
                        <input type="text" id="name" name="name" class="form__input" required>
                    </div>
                    <div class="form__group">
                        <label for="email" class="form__label">Email</label>
                        <input type="email" id="email" name="email" class="form__input" required>
                    </div>
                    <div class="form__group">
                        <label for="message" class="form__label">Mensaje</label>
                        <textarea id="message" name="message" class="form__textarea" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn--primary">Enviar Mensaje</button>
                </form>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <h2 class="section__title">Encuéntranos</h2>
                <p class="section__description">Visítanos en nuestra tienda. Estamos aquí para atenderte.</p>
                <div class="map" id="store-map">
                    <iframe
                        class="map__iframe"
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3762.661497050837!2d-99.16869292394964!3d19.427023681882103!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x85d1ff35f5bd1563%3A0x6c366f0e2de02ff7!2sCalle%20Principal%20123%2C%20Ciudad%20de%20M%C3%A9xico!5e0!3m2!1ses!2smx!4v1700000000000!5m2!1ses!2smx"
                        width="100%"
                        height="450"
                        style="border: 0;"
                        allowfullscreen=""
                        loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade"
                        title="Ubicación de Git12 — Calle Principal 123, Ciudad"
                        aria-label="Mapa de ubicación de Git12"
                    ></iframe>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer"></footer>

    <!-- JavaScript -->
    <script src="src/js/components.js"></script>
    <script src="src/js/main.js"></script>
</body>
</html>
